name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 2.3.0)'
        required: false
        default: '2.3.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Stamp version in package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '${{ github.event.inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Stamp version in Android build.gradle
        shell: bash
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ github.event.inputs.version }}\"/" android/app/build.gradle

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReachoutCommandCenter-v${{ github.event.inputs.version }}-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: android-v${{ github.event.inputs.version }}
          name: Reachout Command Center Android v${{ github.event.inputs.version }}
          body: |
            ## Reachout Command Center — Android v${{ github.event.inputs.version }}

            Same dashboard, devices, divisions, activity, mail, export, and settings
            functionality as the Windows desktop app, rebuilt for mobile.

            ### Installation
            1. Download `app-debug.apk` below
            2. On your Android device, enable "Install unknown apps" for your browser/file manager
            3. Open the downloaded APK and install

            ### Notes
            - This is a debug-signed build intended for direct/sideloaded install.
              For Google Play publishing, a release signing key needs to be configured separately.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
